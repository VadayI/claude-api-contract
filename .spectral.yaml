# Layered Spectral ruleset for claude-api-contract.
# Extends the full spectral:oas baseline and adds repo-specific governance.
# See .claude/rules/spectral-style.md and the spectral-lint skill.
extends: [[spectral:oas, all]]

rules:
  # Operations must be self-describing (consumer DX + generated docs).
  operation-summary-required:
    description: Every operation must have a summary.
    given: $.paths[*][get,post,put,patch,delete]
    severity: error
    then:
      field: summary
      function: truthy

  operation-tags-required:
    description: Every operation must have at least one tag.
    given: $.paths[*][get,post,put,patch,delete]
    severity: error
    then:
      field: tags
      function: truthy

  # operationId becomes a consumer symbol — required and stable.
  operation-operationId-required:
    description: Every operation must declare an operationId.
    given: $.paths[*][get,post,put,patch,delete]
    severity: error
    then:
      field: operationId
      function: truthy

  # Property casing — snake_case repo-wide (matches the DRF consumer default).
  # Shipped severity:error (decision H, 2026-07-07); a derived project may stage via recommended:false.
  schema-property-snake-case:
    description: Schema properties must be snake_case.
    severity: error
    recommended: true
    given: $.components.schemas..properties.*~
    then:
      function: casing
      functionOptions:
        type: snake
        disallowDigits: false

  # Descriptions everywhere (no empty/TODO docs — see no-stubs rule).
  # Shipped severity:error (decision H, 2026-07-07); a derived project may stage via recommended:false.
  schema-description-required:
    description: Named schemas should have a description.
    severity: error
    recommended: true
    given: $.components.schemas[*]
    then:
      field: description
      function: truthy

  # The production server uses https://api.example.com as a placeholder — this
  # is intentional in the template; derived projects replace it. Disable the
  # built-in oas3-server-not-example.com rule (which fires even for
  # recommended:false when using [spectral:oas, all]).
  oas3-server-not-example.com: off

  # Frontend page-vs-system separation (ADR 0010 / endpoint-surface.md).
  # Every operation must declare x-surface = resource | system. Shipped
  # recommended:true (hard — severity error). A derived project not yet ready
  # to classify its endpoints may set recommended:false to stage the rollout.
  operation-x-surface-required:
    description: Every operation must declare x-surface (resource|system).
    message: "{{path}}: operation must set x-surface to 'resource' or 'system' (endpoint-surface.md)."
    severity: error
    recommended: true
    given: $.paths[*][get,post,put,patch,delete]
    then:
      - field: x-surface
        function: truthy
      - field: x-surface
        function: enumeration
        functionOptions:
          values: [resource, system]
