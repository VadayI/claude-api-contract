name: contract-ci

# Контракт-first гейти. 5 перевірок: TypeSpec drift, Spectral lint,
# валідація прикладів, oasdiff breaking (--fail-on ERR), Prism mock smoke.
# Плюс verification-перевірка (не входить у канонічну п'ятірку):
# endpoints-registry coverage (verification.md).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Пінимо oasdiff заради відтворюваного breaking-гейту (раніше було @latest).
# Має збігатися з локальною версією команди (scripts/setup-wsl.sh) — тоді
# `npm run breaking` локально і в CI дають однаковий результат.
env:
  OASDIFF_VERSION: v1.18.4

concurrency:
  group: contract-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags for oasdiff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Guard: чи запускати контрактні гейти.
      #  - spec/ присутній                         → ганяємо 5 гейтів.
      #  - spec/ відсутній + це апстрим-шаблон      → чистий skip (свіжий
      #    каркас ще не має контракту). Сигнал — package.json name досі
      #    "claude-api-contract"; personalize.sh перейменовує пакет на derive,
      #    тож реальний проєкт НЕ може мовчки успадкувати цей skip.
      #  - spec/ відсутній у derived-проєкті        → FAIL (fail-closed):
      #    проєкт, що втратив контракт, має червоніти, а не мовчки зеленіти.
      - name: Detect spec/ (template-state guard)
        id: guard
        run: |
          if [ -d spec ]; then
            echo "has_spec=true"  >> "$GITHUB_OUTPUT"
            echo "spec/ present — contract gates will run."
          else
            PKG_NAME="$(node -p "require('./package.json').name" 2>/dev/null || echo '')"
            if [ "$PKG_NAME" = "claude-api-contract" ]; then
              echo "has_spec=false" >> "$GITHUB_OUTPUT"
              echo "::notice::No spec/ and this is the upstream template (package '$PKG_NAME') — contract gates skipped (scaffold only)."
            else
              echo "::error::spec/ is missing in a derived project (package '$PKG_NAME'). Contract gates cannot run. Restore spec/ (or run the contract pipeline); never merge a contract-less green build."
              exit 1
            fi
          fi

      - name: Install oasdiff (breaking-change gate)
        if: steps.guard.outputs.has_spec == 'true'
        run: go install "github.com/oasdiff/oasdiff@${OASDIFF_VERSION}"

      - name: Add Go bin to PATH
        if: steps.guard.outputs.has_spec == 'true'
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # --- Гейт 1: TypeSpec drift (openapi.yml == spec/ output) ---
      - name: Gate 1 — TypeSpec drift
        if: steps.guard.outputs.has_spec == 'true'
        run: |
          npm run api:compile
          bash scripts/check_typespec_drift.sh

      # --- Гейт 2: Spectral lint (шаровий рулсет) ---
      - name: Gate 2 — Spectral lint
        if: steps.guard.outputs.has_spec == 'true'
        run: npm run lint

      # --- Гейт 3: валідація прикладів проти схем ---
      - name: Gate 3 — Examples validation
        if: steps.guard.outputs.has_spec == 'true'
        run: bash scripts/check_examples.sh

      # --- Гейт 4: oasdiff breaking vs останній тег (--fail-on ERR) ---
      - name: Gate 4 — Breaking changes (oasdiff)
        if: steps.guard.outputs.has_spec == 'true'
        run: npm run breaking

      # --- Гейт 5: Prism mock smoke (mock піднімається + валідні відповіді) ---
      - name: Gate 5 — Prism mock smoke
        if: steps.guard.outputs.has_spec == 'true'
        run: npm run mock:smoke

      # --- Verification: endpoints registry coverage (verification.md) ---
      # Доповнює 5 гейтів (не канонічна п'ятірка). Кожна операція (method, path)
      # в openapi.yml має запис у .claude/memory/endpoints.json. State-перевірка,
      # не diff-scoped: не фаєрить на зміни лише моделей/описів — лише на
      # незареєстрований ендпоінт.
      - name: Verify — Endpoints registry coverage
        if: steps.guard.outputs.has_spec == 'true'
        run: npm run check:endpoints
